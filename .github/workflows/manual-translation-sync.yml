name: Manual translation sync

on:
  workflow_dispatch:
    inputs:
      from_ref:
        description: 'English ref before the updates to translate (ignored when full_sync is true)'
        required: false
        default: 'HEAD~1'
        type: string
      to_ref:
        description: 'English ref containing the updates to translate'
        required: false
        default: 'origin/master'
        type: string
      languages:
        description: 'Comma-separated language branches'
        required: false
        default: 'french,spanish,japanese,german'
        type: string
      full_sync:
        description: 'Create bootstrap issues for all published Markdown files from the selected English ref'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Create the issue without assigning it to Copilot'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  sync-language:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [french, spanish, japanese, german]

    steps:
      - name: Check language selection
        id: selected
        env:
          SELECTED_LANGUAGES: ${{ inputs.languages }}
          CURRENT_LANGUAGE: ${{ matrix.language }}
        run: |
          set -euo pipefail

          NORMALIZED="$(echo "${SELECTED_LANGUAGES}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          if [[ ",${NORMALIZED}," == *",${CURRENT_LANGUAGE},"* ]]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
            {
              echo "### ${CURRENT_LANGUAGE}"
              echo "Skipped because it was not requested in the languages input."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Prepare repository
        if: steps.selected.outputs.selected == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          git init .
          git config --global --add safe.directory "$PWD"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune origin "+refs/heads/*:refs/remotes/origin/*"
          git checkout -B master origin/master

      - name: Collect Markdown files to translate
        if: steps.selected.outputs.selected == 'true'
        id: changes
        env:
          FROM_REF: ${{ inputs.from_ref }}
          TO_REF: ${{ inputs.to_ref }}
          FULL_SYNC: ${{ inputs.full_sync }}
        run: |
          set -euo pipefail

          git fetch origin master "${{ matrix.language }}"
          git rev-parse "${TO_REF}^{commit}" >/dev/null

          if [ "${FULL_SYNC}" = "true" ]; then
            git ls-tree -r --name-only "${TO_REF}" | grep -E '\.md$' | grep -v '^.github/' > target-files.txt || true
            RANGE_DESC="${TO_REF} (full sync)"
          else
            git rev-parse "${FROM_REF}^{commit}" >/dev/null
            git diff --name-only --find-renames "${FROM_REF}" "${TO_REF}" -- '*.md' ':(exclude).github/**' > target-files.txt
            RANGE_DESC="${FROM_REF}..${TO_REF}"
          fi

          if [ ! -s target-files.txt ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            {
              echo "### ${{ matrix.language }}"
              echo "No Markdown files found for ${RANGE_DESC}."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          FILE_COUNT="$(wc -l < target-files.txt | tr -d ' ')"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "range_desc=${RANGE_DESC}" >> "$GITHUB_OUTPUT"
          echo "file_count=${FILE_COUNT}" >> "$GITHUB_OUTPUT"
      - name: Create translation issue
        if: steps.changes.outputs.has_changes == 'true'
        env:
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          LANGUAGE_BRANCH: ${{ matrix.language }}
          FROM_REF: ${{ inputs.from_ref }}
          TO_REF: ${{ inputs.to_ref }}
          FULL_SYNC: ${{ inputs.full_sync }}
          DRY_RUN: ${{ inputs.dry_run }}
          RANGE_DESC: ${{ steps.changes.outputs.range_desc }}
          FILE_COUNT: ${{ steps.changes.outputs.file_count }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${COPILOT_PAT:-}" ]; then
            echo "::error::Missing repository secret COPILOT_PAT."
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os
          import sys
          import textwrap
          import urllib.error
          import urllib.request

          owner = os.environ["OWNER"]
          repo = os.environ["REPO_NAME"]
          language = os.environ["LANGUAGE_BRANCH"]
          full_sync = os.environ["FULL_SYNC"].lower() == "true"
          dry_run = os.environ["DRY_RUN"].lower() == "true"
          range_desc = os.environ["RANGE_DESC"]
          file_count = os.environ["FILE_COUNT"]
          with open("target-files.txt", "r", encoding="utf-8") as handle:
              target_files = [line.strip() for line in handle if line.strip()]
          token = os.environ["COPILOT_PAT"]

          def graphql(query: str, variables: dict) -> dict:
              req = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=json.dumps({"query": query, "variables": variables}).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "GraphQL-Features": "issues_copilot_assignment_api_support,coding_agent_model_selection",
                      "User-Agent": "jjazzlab-translation-workflow",
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req) as response:
                      payload = json.load(response)
              except urllib.error.HTTPError as exc:
                  sys.stderr.write(exc.read().decode("utf-8", errors="replace"))
                  raise

              if "errors" in payload:
                  raise RuntimeError(json.dumps(payload["errors"], indent=2))
              return payload["data"]

          repo_query = """
          query($owner: String!, $name: String!) {
            repository(owner: $owner, name: $name) {
              id
              suggestedActors(capabilities: [CAN_BE_ASSIGNED], first: 100) {
                nodes {
                  __typename
                  ... on Bot {
                    id
                    login
                  }
                  ... on User {
                    id
                    login
                  }
                }
              }
            }
          }
          """

          repo_data = graphql(repo_query, {"owner": owner, "name": repo})["repository"]
          if repo_data is None:
              raise RuntimeError("Repository lookup failed.")

          repo_id = repo_data["id"]
          copilot_actor = None
          for node in repo_data["suggestedActors"]["nodes"]:
              login = (node or {}).get("login")
              if login in {"copilot-swe-agent", "copilot"}:
                  copilot_actor = node
                  break

          if copilot_actor is None and not dry_run:
              raise RuntimeError(
                  "Copilot cloud agent is not assignable in this repository for the provided user token."
              )

          if full_sync:
              title = f"Bootstrap {language} from master"
              task_summary = (
                  f"Translate the current English documentation on `master` into the `{language}` branch."
              )
          else:
              title = f"Sync master changes into {language}"
              task_summary = (
                  f"Translate the latest English documentation changes from `{range_desc}` into the `{language}` branch."
              )

          if dry_run:
              title = f"[Dry run] {title}"

          if full_sync:
              files_section = textwrap.dedent(f"""\
              The task covers **all published Markdown pages** from `{range_desc}`.

              Target file count: **{file_count}**
              """)
          else:
              files_block = "\n".join(target_files[:200])
              files_section = textwrap.dedent(f"""\
              Translate only these Markdown files:

              ```text
              {files_block}
              ```
              """)

          body = textwrap.dedent(f"""\
          {task_summary}

          ## Target

          - Repository: `{owner}/{repo}`
          - Base branch for Copilot work: `{language}`
          - English source: `{range_desc}`
          - Translation mode: `{"full sync" if full_sync else "incremental sync"}`

          ## Required repository guidance

          Before making changes, read these files in the repository:

          - `.github/copilot-instructions.md`
          - `.github/copilot/translate-docs-prompt.txt`
          - `.github/copilot/translation-glossary.md`

          ## Translation requirements

          - Preserve GitBook syntax exactly: YAML frontmatter keys, `{{% hint %}}`, `{{% embed %}}`, HTML `<figure>`, explicit anchors, tables, and code fences.
          - Preserve relative links, `.md` targets, anchors, image paths, and filenames unless the English source changed them.
          - Keep every term listed in `.github/copilot/translation-glossary.md` in English.
          - Preserve literal UI/menu strings in English, for example `File/Import Songs...` and `Tools/Options/Midi`.
          - Keep the translated branch consistent with existing translated wording where possible.
          - Do not edit files under `.github/`.

          ## Scope

          {files_section}

          ## Expected result

          Raise a pull request targeting `{language}` with the translated documentation changes only.
          """)

          create_query = """
          mutation($input: CreateIssueInput!) {
            createIssue(input: $input) {
              issue {
                id
                number
                url
                title
              }
            }
          }
          """

          issue_input = {
              "repositoryId": repo_id,
              "title": title,
              "body": body,
          }

          if not dry_run:
              issue_input["assigneeIds"] = [copilot_actor["id"]]
              issue_input["agentAssignment"] = {
                  "targetRepositoryId": repo_id,
                  "baseRef": language,
                  "customInstructions": (
                      "Read .github/copilot-instructions.md, "
                      ".github/copilot/translate-docs-prompt.txt, and "
                      ".github/copilot/translation-glossary.md before editing. "
                      "Preserve GitBook syntax and keep glossary terms in English. "
                      "Only work on the requested documentation scope and raise a PR targeting the base branch."
                  ),
              }

          created = graphql(create_query, {"input": issue_input})["createIssue"]["issue"]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"issue_number={created['number']}\n")
              output.write(f"issue_url={created['url']}\n")
              output.write(f"issue_title={created['title']}\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write(f"### {language}\n")
              summary.write(f"Issue: [{created['title']}]({created['url']})\n\n")
              if dry_run:
                  summary.write("Created in dry-run mode without assigning it to Copilot.\n")
              else:
                  summary.write("Created and assigned to Copilot.\n")
          PY
