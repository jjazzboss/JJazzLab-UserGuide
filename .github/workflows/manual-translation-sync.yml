name: Manual translation sync

on:
  workflow_dispatch:
    inputs:
      from_ref:
        description: 'English ref before the updates to translate (ignored when full_sync is true)'
        required: false
        default: 'HEAD~1'
        type: string
      to_ref:
        description: 'English ref containing the updates to translate'
        required: false
        default: 'origin/master'
        type: string
      languages:
        description: 'Comma-separated language branches'
        required: false
        default: 'french,spanish,japanese,german'
        type: string
      full_sync:
        description: 'Translate all published Markdown files from the selected English ref instead of only changed files'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Generate translation changes without pushing branches or opening PRs'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-language:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [french, spanish, japanese, german]

    steps:
      - name: Check language selection
        id: selected
        env:
          SELECTED_LANGUAGES: ${{ inputs.languages }}
          CURRENT_LANGUAGE: ${{ matrix.language }}
        run: |
          set -euo pipefail

          NORMALIZED="$(echo "${SELECTED_LANGUAGES}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          if [[ ",${NORMALIZED}," == *",${CURRENT_LANGUAGE},"* ]]; then
            echo "selected=true" >> "$GITHUB_OUTPUT"
          else
            echo "selected=false" >> "$GITHUB_OUTPUT"
            {
              echo "### ${CURRENT_LANGUAGE}"
              echo "Skipped because it was not requested in the languages input."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Prepare repository
        if: steps.selected.outputs.selected == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          git init .
          git config --global --add safe.directory "$PWD"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune origin "+refs/heads/*:refs/remotes/origin/*"
          git checkout -B master origin/master

      - name: Install Copilot CLI
        if: steps.selected.outputs.selected == 'true'
        run: npm install -g @github/copilot

      - name: Collect Markdown files to translate
        if: steps.selected.outputs.selected == 'true'
        id: changes
        env:
          FROM_REF: ${{ inputs.from_ref }}
          TO_REF: ${{ inputs.to_ref }}
          FULL_SYNC: ${{ inputs.full_sync }}
        run: |
          set -euo pipefail

          git fetch origin master "${{ matrix.language }}"

          git rev-parse "${TO_REF}^{commit}" >/dev/null

          if [ "${FULL_SYNC}" = "true" ]; then
            git ls-tree -r --name-only "${TO_REF}" | grep -E '\.md$' | grep -v '^.github/' | sed 's/^/M\t/' > changes.tsv || true
            RANGE_DESC="${TO_REF} (full sync)"
          else
            git rev-parse "${FROM_REF}^{commit}" >/dev/null
            git diff --name-status --find-renames "${FROM_REF}" "${TO_REF}" -- '*.md' ':(exclude).github/**' > changes.tsv
            RANGE_DESC="${FROM_REF}..${TO_REF}"
          fi

          if [ ! -s changes.tsv ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            {
              echo "### ${{ matrix.language }}"
              echo "No Markdown files found for ${RANGE_DESC}."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "range_desc=${RANGE_DESC}" >> "$GITHUB_OUTPUT"
          {
            echo "files<<EOF"
            cat changes.tsv
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create sync branch
        if: steps.changes.outputs.has_changes == 'true'
        id: branch
        env:
          TO_REF: ${{ inputs.to_ref }}
          FULL_SYNC: ${{ inputs.full_sync }}
        run: |
          set -euo pipefail

          SHORT_SHA="$(git rev-parse --short "${TO_REF}")"
          if [ "${FULL_SYNC}" = "true" ]; then
            SYNC_BRANCH="ai-bootstrap/${{ matrix.language }}/${SHORT_SHA}"
            git checkout -B "${SYNC_BRANCH}" "origin/master"
          else
            SYNC_BRANCH="ai-sync/${{ matrix.language }}/${SHORT_SHA}"
            git checkout -B "${SYNC_BRANCH}" "origin/${{ matrix.language }}"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "sync_branch=${SYNC_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Translate Markdown files
        if: steps.changes.outputs.has_changes == 'true'
        env:
          FROM_REF: ${{ inputs.from_ref }}
          TO_REF: ${{ inputs.to_ref }}
          FULL_SYNC: ${{ inputs.full_sync }}
          LANGUAGE_BRANCH: ${{ matrix.language }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${COPILOT_GITHUB_TOKEN:-}" ]; then
            echo "::error::Missing repository secret COPILOT_PAT. Create a fine-grained PAT with Copilot Requests permission."
            exit 1
          fi

          mkdir -p .copilot-tmp

          while IFS=$'\t' read -r status path_a path_b; do
            old_english_path=""
            target_path=""
            translation_seed_path=""
            renamed_from=""

            case "$status" in
              A|M)
                old_english_path="$path_a"
                target_path="$path_a"
                translation_seed_path="$path_a"
                ;;
              D)
                rm -f -- "$path_a"
                git add -A -- "$path_a"
                continue
                ;;
              R*)
                old_english_path="$path_a"
                target_path="$path_b"
                translation_seed_path="$path_b"
                renamed_from="$path_a"
                ;;
              *)
                echo "::warning::Skipping unsupported diff status '$status'"
                continue
                ;;
            esac

            mkdir -p "$(dirname "$target_path")"

            if git cat-file -e "${FROM_REF}:${old_english_path}" 2>/dev/null; then
              git show "${FROM_REF}:${old_english_path}" > .copilot-tmp/old-english.md
            else
              : > .copilot-tmp/old-english.md
            fi

            git show "${TO_REF}:${target_path}" > .copilot-tmp/new-english.md

            if [ "${FULL_SYNC}" = "true" ] && git cat-file -e "origin/${LANGUAGE_BRANCH}:${translation_seed_path}" 2>/dev/null; then
              git show "origin/${LANGUAGE_BRANCH}:${translation_seed_path}" > .copilot-tmp/current-translation.md
            elif [ -f "$translation_seed_path" ]; then
              cp "$translation_seed_path" .copilot-tmp/current-translation.md
            elif [ -n "$renamed_from" ] && [ -f "$renamed_from" ]; then
              cp "$renamed_from" .copilot-tmp/current-translation.md
            else
              : > .copilot-tmp/current-translation.md
            fi

            git show origin/master:.github/copilot/translate-docs-prompt.txt > .copilot-tmp/prompt.txt
            git show origin/master:.github/copilot/translation-glossary.md > .copilot-tmp/translation-glossary.md
            {
              echo
              echo "Target language branch: ${LANGUAGE_BRANCH}"
              echo "Output file path: ${target_path}"
              echo "Read these workspace files:"
              echo "- .copilot-tmp/old-english.md"
              echo "- .copilot-tmp/new-english.md"
              echo "- .copilot-tmp/current-translation.md"
              echo "- .copilot-tmp/translation-glossary.md"
              echo
              echo "Write the translated page to ${target_path}."
            } >> .copilot-tmp/prompt.txt

            copilot -p "$(cat .copilot-tmp/prompt.txt)" \
              --allow-tool='shell(cat:*)' \
              --allow-tool=write \
              --no-ask-user

            if [ -n "$renamed_from" ] && [ "$renamed_from" != "$target_path" ]; then
              rm -f -- "$renamed_from"
              git add -A -- "$renamed_from"
            fi

            git add -- "$target_path"
          done < changes.tsv

      - name: Validate links
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          LYCHHEE_VERSION="0.15.1"
          curl -sSfL "https://github.com/lycheeverse/lychee/releases/download/lychee-v${LYCHHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz" -o lychee.tar.gz
          tar -xzf lychee.tar.gz lychee
          chmod +x ./lychee
          ./lychee --verbose --no-progress './**/*.md'

      - name: Commit translation updates
        if: steps.changes.outputs.has_changes == 'true'
        id: commit
        env:
          FULL_SYNC: ${{ inputs.full_sync }}
        run: |
          set -euo pipefail

          if git diff --cached --quiet; then
            echo "has_commit=false" >> "$GITHUB_OUTPUT"
            {
              echo "### ${{ matrix.language }}"
              echo "No translated file changes were produced."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "${FULL_SYNC}" = "true" ]; then
            git commit -m "Bootstrap ${{ matrix.language }} from master"
          else
            git commit -m "Sync master changes into ${{ matrix.language }}"
          fi
          echo "has_commit=true" >> "$GITHUB_OUTPUT"

      - name: Push sync branch
        if: steps.commit.outputs.has_commit == 'true' && inputs.dry_run != true
        run: git push --force-with-lease origin "${{ steps.branch.outputs.sync_branch }}"

      - name: Open or update pull request
        if: steps.commit.outputs.has_commit == 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_BRANCH: ${{ matrix.language }}
          HEAD_BRANCH: ${{ steps.branch.outputs.sync_branch }}
          FULL_SYNC: ${{ inputs.full_sync }}
          RANGE_DESC: ${{ steps.changes.outputs.range_desc }}
          CHANGED_FILES: ${{ steps.changes.outputs.files }}
        run: |
          set -euo pipefail

          if [ "${FULL_SYNC}" = "true" ]; then
            TITLE="Bootstrap ${BASE_BRANCH} from master"
            INTRO="This PR was generated by the manual translation workflow in full-sync mode."
          else
            TITLE="Sync master changes into ${BASE_BRANCH}"
            INTRO="This PR was generated by the manual translation sync workflow."
          fi

          cat > pr-body.md <<EOF
          ${INTRO}

          English source: \`${RANGE_DESC}\`

          Changed Markdown files:
          \`\`\`
          ${CHANGED_FILES}
          \`\`\`
          EOF

          PR_NUMBER="$(gh pr list --base "${BASE_BRANCH}" --head "${HEAD_BRANCH}" --json number --jq '.[0].number')"

          if [ -n "${PR_NUMBER}" ] && [ "${PR_NUMBER}" != "null" ]; then
            gh pr edit "${PR_NUMBER}" --title "${TITLE}" --body-file pr-body.md
          else
            gh pr create --base "${BASE_BRANCH}" --head "${HEAD_BRANCH}" --title "${TITLE}" --body-file pr-body.md
          fi

          {
            echo "### ${BASE_BRANCH}"
            echo "PR branch: \`${HEAD_BRANCH}\`"
          } >> "$GITHUB_STEP_SUMMARY"
